name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch REAPER SDK headers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "lib/reaper-sdk" | Out-Null
          Invoke-WebRequest -Uri "https://www.reaper.fm/sdk/plugin/reaper_plugin.h" -OutFile "lib/reaper-sdk/reaper_plugin.h"
          Invoke-WebRequest -Uri "https://www.reaper.fm/sdk/plugin/reaper_plugin_functions.h" -OutFile "lib/reaper-sdk/reaper_plugin_functions.h"

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Stage install
        run: cmake --install build --config Release --prefix stage

      - name: Upload staged artifact
        uses: actions/upload-artifact@v4
        with:
          name: wingconnector-${{ matrix.os }}-stage
          path: stage/
          if-no-files-found: error
